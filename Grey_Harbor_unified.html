<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Grey Harbor — Intelligence Training Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #0A0F1A; color: #D1D5DB; overflow: hidden; height: 100vh; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.3s ease-out; }

/* WELCOME */
.welcome-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.welcome-inner { max-width:620px; width:100%; background:#111827; border-radius:12px; border:1px solid #1F2937; overflow:hidden; }
.welcome-header { background:linear-gradient(135deg,#1E3A5F 0%,#0A0F1A 100%); padding:32px 28px 24px; border-bottom:1px solid #1F2937; }
.class-tag { font-size:10px; letter-spacing:2px; color:#EF4444; font-weight:700; margin-bottom:12px; font-family:'JetBrains Mono',monospace; }
.welcome-title { font-size:36px; font-weight:800; color:#F9FAFB; letter-spacing:2px; font-family:'Space Grotesk',system-ui; }
.welcome-sub { font-size:14px; color:#9CA3AF; margin-top:4px; }
.welcome-body { padding:24px 28px; }
.welcome-text { font-size:13px; line-height:1.7; color:#D1D5DB; margin-bottom:14px; }
.pir-box { background:#0D1117; border:1px solid #1F2937; border-radius:8px; padding:14px; margin:16px 0; }
.pir-title { font-size:11px; font-weight:700; color:#6B7280; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.pir-row { display:flex; gap:8px; padding:3px 0; }
.pir-id { font-size:11px; color:#4A7BF7; font-weight:700; min-width:44px; font-family:'JetBrains Mono',monospace; }
.pir-label { font-size:12px; color:#9CA3AF; }
.api-key-section { margin:16px 0; padding:14px; background:#0D1117; border:1px solid #1F2937; border-radius:8px; }
.api-key-label { font-size:11px; font-weight:700; color:#6B7280; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.api-key-desc { font-size:11px; color:#6B7280; margin-bottom:8px; }
.api-key-input { width:100%; background:#111827; border:1px solid #374151; border-radius:6px; padding:8px 10px; font-size:12px; color:#D1D5DB; font-family:'JetBrains Mono',monospace; outline:none; }
.api-key-input:focus { border-color:#4A7BF7; }
.start-btn { width:100%; padding:14px 24px; background:linear-gradient(135deg,#1E3A5F,#4A7BF7); color:#F9FAFB; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1px; margin-top:8px; }
.start-btn:hover { filter:brightness(1.1); }

/* LAYOUT */
.layout { display:flex; height:100vh; overflow:hidden; }
.left-panel { width:280px; background:#111827; border-right:1px solid #1F2937; padding:14px; overflow-y:auto; flex-shrink:0; }
.center-panel { flex:1; overflow-y:auto; padding:20px; }
.center-inner { max-width:640px; margin:0 auto; }
.right-panel { width:220px; background:#111827; border-left:1px solid #1F2937; padding:14px; overflow-y:auto; flex-shrink:0; }
.panel-title { font-size:10px; font-weight:700; color:#6B7280; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }

/* AGENT CARDS */
.agent-card { background:#0D1117; border:1px solid #1F2937; border-radius:8px; padding:10px; margin-bottom:8px; }
.agent-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.agent-name { font-size:12px; font-weight:700; }
.agent-layer { font-size:9px; color:#6B7280; }
.agent-output { font-size:11px; line-height:1.5; white-space:pre-wrap; }
.loading-dot { width:6px; height:6px; border-radius:50%; margin-left:auto; animation:pulse 1s infinite; }
.loading-text { font-size:11px; color:#6B7280; font-style:italic; }
.authority-boundary { display:flex; align-items:center; gap:8px; margin:12px 0 6px; }
.boundary-line { flex:1; height:1px; background:#EF4444; opacity:0.4; }
.boundary-label { font-size:9px; color:#EF4444; font-weight:700; letter-spacing:1px; white-space:nowrap; }
.your-decision { text-align:center; font-size:11px; color:#9CA3AF; font-weight:600; }

/* INTEL CARD */
.intel-card { background:#111827; border:1px solid #1F2937; border-radius:10px; padding:18px; margin-bottom:16px; }
.intel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.intel-meta { display:flex; gap:8px; align-items:center; }
.type-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; letter-spacing:1px; }
.reliability-badge { font-size:11px; font-weight:700; }
.timestamp-badge { font-size:11px; color:#6B7280; font-family:'JetBrains Mono',monospace; }
.item-counter { font-size:11px; color:#6B7280; }
.item-id { font-size:14px; font-weight:700; color:#F9FAFB; margin-bottom:8px; font-family:'JetBrains Mono',monospace; }
.item-summary { font-size:14px; line-height:1.7; color:#E5E7EB; }

/* ACTIONS */
.action-area { background:#111827; border:1px solid #1F2937; border-radius:10px; padding:18px; }
.action-title { font-size:12px; font-weight:700; color:#9CA3AF; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
.action-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.action-btn { display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 8px; background:transparent; border:1px solid #374151; border-radius:8px; cursor:pointer; transition:all 0.2s; color:#D1D5DB; font-family:inherit; }
.action-btn:hover { border-color:#6B7280; }
.action-btn.selected { background:rgba(74,123,247,0.1); border-color:#4A7BF7; }
.action-btn .icon { font-size:16px; }
.action-btn .label { font-size:10px; font-weight:600; }
.correlate-area { margin-bottom:10px; }
.correlate-title { font-size:11px; color:#9CA3AF; margin-bottom:6px; }
.correlate-chips { display:flex; flex-wrap:wrap; gap:4px; }
.correlate-chip { font-size:10px; padding:4px 8px; border-radius:4px; border:1px solid #374151; background:transparent; color:#D1D5DB; cursor:pointer; font-family:'JetBrains Mono',monospace; }
.correlate-chip.selected { border-color:#9B59B6; background:rgba(155,89,182,0.12); }
.rationale-input { width:100%; background:#0D1117; border:1px solid #374151; border-radius:6px; padding:8px 10px; font-size:12px; color:#D1D5DB; font-family:'DM Sans',system-ui; resize:vertical; outline:none; margin-bottom:10px; }
.rationale-input:focus { border-color:#4A7BF7; }
.submit-row { display:flex; justify-content:flex-end; gap:8px; }
.submit-btn { padding:10px 24px; background:#4A7BF7; color:#F9FAFB; border:none; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
.submit-btn:disabled { opacity:0.4; cursor:default; }
.submit-btn:hover:not(:disabled) { filter:brightness(1.1); }
.change-btn { padding:10px 20px; background:transparent; color:#E67E22; border:1px solid #E67E22; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }

/* CHALLENGE */
.challenge-card { background:rgba(124,45,18,0.06); border:1px solid #E67E22; border-radius:8px; padding:14px; margin:10px 0; }
.challenge-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.challenge-label { font-size:12px; font-weight:700; color:#E67E22; }
.challenge-text { font-size:13px; line-height:1.6; color:#FBBF24; }

/* FEEDBACK */
.feedback-area { background:#111827; border:1px solid #1F2937; border-radius:10px; padding:18px; }
.feedback-header { padding-left:12px; margin-bottom:14px; }
.feedback-result { font-size:16px; font-weight:800; letter-spacing:1px; }
.feedback-action { display:block; font-size:11px; color:#6B7280; margin-top:2px; }
.coach-output { margin-bottom:14px; }
.coach-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.coach-label { font-size:12px; font-weight:700; color:#27AE60; }
.coach-text { font-size:13px; line-height:1.6; color:#D1D5DB; white-space:pre-wrap; }
.teaching-point { background:#0D1117; border:1px solid #1F2937; border-radius:8px; padding:12px; margin-bottom:14px; }
.tp-label { font-size:9px; font-weight:700; color:#4A7BF7; letter-spacing:1px; margin-bottom:4px; }
.tp-text { font-size:13px; line-height:1.6; color:#E5E7EB; font-style:italic; }
.next-btn { width:100%; padding:12px; background:#1F2937; color:#F9FAFB; border:1px solid #374151; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
.next-btn:hover { background:#374151; }

/* RIGHT PANEL */
.rp-section { margin-bottom:16px; }
.rp-section-title { font-size:10px; font-weight:700; color:#6B7280; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.perf-row { display:flex; justify-content:space-between; font-size:11px; padding:3px 0; border-bottom:1px solid rgba(31,41,55,0.25); }
.perf-val { font-weight:700; font-family:'JetBrains Mono',monospace; }
.badge-progress { margin-bottom:8px; }
.badge-progress-header { display:flex; justify-content:space-between; align-items:center; font-size:10px; margin-bottom:3px; }
.mini-tier { font-size:8px; font-weight:800; padding:1px 4px; border-radius:3px; color:#1F2937; }
.progress-bar { height:4px; background:#1F2937; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; transition:width 0.5s; }
.log-entry { padding:6px 0; border-bottom:1px solid rgba(31,41,55,0.25); }
.log-top { display:flex; align-items:center; gap:6px; }
.log-type { font-size:8px; font-weight:700; padding:1px 4px; border-radius:3px; letter-spacing:0.5px; }
.log-id { font-size:10px; color:#9CA3AF; font-family:'JetBrains Mono',monospace; }
.log-result { margin-left:auto; font-size:8px; }
.log-action { font-size:10px; margin-top:2px; font-weight:500; }
.no-items { font-size:11px; color:#4B5563; font-style:italic; }

/* SUMMARY */
.summary-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.stat-card { background:#0D1117; border:1px solid #1F2937; border-radius:8px; padding:14px; text-align:center; }
.stat-num { font-size:28px; font-weight:800; color:#F9FAFB; }
.stat-label { font-size:10px; color:#6B7280; margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
.badge-summary { background:#0D1117; border:1px solid #1F2937; border-radius:8px; padding:14px; }
.badge-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(31,41,55,0.25); font-size:13px; }
.tier-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:4px; }

/* Mode indicator */
.mode-indicator { font-size:9px; padding:2px 6px; border-radius:3px; font-weight:600; margin-left:auto; }
</style>
<style>
/* MOBILE OVERRIDES */
@media (max-width: 899px) {
  html, body { overflow: auto !important; height: auto !important; background: #eef0f4 !important; color: #1a1d2e !important; }
  #app { min-height: 100vh; background: #eef0f4; }
}

<script>
// ═══════════════════════════════════════════════════════════════════════════════

const TYPE_COLORS = {

  { id:"CORROBORATION_SKILL", label:"Corroboration", icon:"🔗", items:[3,7,11,15,16,18,26], thresholds:{bronze:0.43,silver:0.71,gold:1.0} },
  { id:"ESCALATION_JUDGMENT", label:"Escalation Judgment", icon:"⬆️", items:[9,10,12,13,17,19,20,22,23,25,27], thresholds:{bronze:0.55,silver:0.73,gold:0.91} },

  { id:"FALSE_NEG_AVOIDANCE", label:"False Neg Avoidance", icon:"🛡️", items:[9,12,13,17,21,25,27], thresholds:{bronze:0.71,silver:0.86,gold:1.0} },
];


// ─── INTEL ITEMS (all 28) ────────────────────────────────────────────────────
const ITEMS=[{index:1,item_id:"GH-HUM-014",type:"HUMINT",reliability:"Credible",timestamp:"0730",summary:"Unidentified trucks unloading long, wooden, sealed crates at a disused fuel depot east of Larni at night.",ideal_action:"FLAG_AMBIGUOUS",acceptable_actions:["FLAG_AMBIGUOUS","REQUEST_COLLECTION"],correlation_targets:[],threat_track:"LOGISTICS",ccir_match:["PIR-5"],difficulty:"medium",teaching_point:"First reports in a new situation should be flagged, not dismissed. Absence of corroboration is not evidence of irrelevance.",feedback:{ELEVATE:"Elevating a single uncorroborated HUMINT report risks alert fatigue. Better to flag as ambiguous and request imagery.",CORRELATE:"No prior items exist to correlate against—this is the first report.",FLAG_AMBIGUOUS:"Correct. Credible source, concerning indicators, but single-source and unverified.",DEFER:"Deferring a credible HUMINT report about unusual nighttime activity is too passive.",DISMISS:"Dangerous. Credible-rated HUMINT with multiple concerning details should not be dismissed.",REQUEST_COLLECTION:"Good judgment. Requesting follow-up ISR would provide corroboration."}},{index:2,item_id:"GH-OSINT-221",type:"OSINT",reliability:"Low",timestamp:"1615",summary:"Social media post claiming military equipment arrival; blurred photo likely recycled from prior year.",ideal_action:"DISMISS",acceptable_actions:["DISMISS","FLAG_AMBIGUOUS"],correlation_targets:["GH-HUM-014"],threat_track:"DECEPTION",ccir_match:[],difficulty:"easy",teaching_point:"Not all information that touches your topic is signal. Recycled imagery is a common disinformation tactic.",feedback:{ELEVATE:"Elevating low-confidence OSINT with recycled imagery erodes commander trust.",CORRELATE:"Linking confirmed noise to a legitimate report contaminates analysis.",FLAG_AMBIGUOUS:"Acceptable but generous. The recycled photo makes this largely assessable as noise.",DEFER:"Deferring known noise wastes analyst bandwidth later.",DISMISS:"Correct. Low confidence, recycled imagery, no verifiable new information.",REQUEST_COLLECTION:"Requesting collection to verify a debunked social media post wastes ISR assets."}},{index:3,item_id:"GH-SIG-087",type:"SIGINT",reliability:"High",timestamp:"2300",summary:'Intercepted comms refer to "cargo ahead of schedule" and "temporary tanks"; phrasing is highly ambiguous.',ideal_action:"CORRELATE",acceptable_actions:["CORRELATE","FLAG_AMBIGUOUS"],correlation_targets:["GH-HUM-014"],threat_track:"LOGISTICS",ccir_match:["PIR-2","PIR-3"],difficulty:"medium",teaching_point:"Cross-discipline correlation is the highest-value analyst skill. HUMINT says 'crates at the fuel depot.' SIGINT says 'cargo ahead of schedule, temporary tanks.'",feedback:{ELEVATE:"Content too ambiguous to elevate. 'Temporary tanks' could be fuel storage.",CORRELATE:"Excellent. 'Cargo ahead of schedule' links to GH-HUM-014's nighttime crate deliveries.",FLAG_AMBIGUOUS:"Acceptable but a skilled analyst would recognize the correlation with GH-HUM-014.",DEFER:"Deferring high-confidence SIGINT is risky.",DISMISS:"Critical error. High-confidence SIGINT with potential correlation.",REQUEST_COLLECTION:"Reasonable, but correlate first."}},{index:4,item_id:"GH-IMN-003",type:"IMINT",reliability:"Routine",timestamp:"0440",summary:"Industrial zone monitoring shows routine vehicle presence; security perimeter remains unchanged.",ideal_action:"DEFER",acceptable_actions:["DEFER","DISMISS"],correlation_targets:[],threat_track:null,ccir_match:[],difficulty:"easy",teaching_point:"Baseline reports have value as anchors for future change detection, but should never reach the commander.",feedback:{ELEVATE:"Nothing actionable. Elevating routine baselines erodes signal-to-noise.",CORRELATE:"Nothing to correlate—no change from baseline.",FLAG_AMBIGUOUS:"Not ambiguous. Clearly routine.",DEFER:"Correct. Log the baseline but don't surface it.",DISMISS:"Acceptable. No new intelligence value.",REQUEST_COLLECTION:"Wasteful for unchanged zone."}},{index:5,item_id:"GH-HUM-015",type:"HUMINT",reliability:"Unverified",timestamp:"0615",summary:"Secondhand accounts of weapons distribution via a social media group; details remain vague.",ideal_action:"DISMISS",acceptable_actions:["DISMISS","DEFER"],correlation_targets:[],threat_track:"DECEPTION",ccir_match:[],difficulty:"easy",teaching_point:"Vague secondhand reports amplify noise.",feedback:{ELEVATE:"Wastes commander bandwidth.",CORRELATE:"Too weak to drive correlation.",FLAG_AMBIGUOUS:"Overly generous.",DEFER:"Acceptable.",DISMISS:"Correct. Multiple red flags.",REQUEST_COLLECTION:"No specifics to collect against."}},{index:6,item_id:"GH-OSI-229",type:"OSINT",reliability:"Low",timestamp:"2215",summary:"News reports indicate backlogs in inspections and personnel shortages for the upcoming weekend.",ideal_action:"DEFER",acceptable_actions:["DEFER","FLAG_AMBIGUOUS"],correlation_targets:[],threat_track:"LOGISTICS",ccir_match:["PIR-5"],difficulty:"hard",teaching_point:"Enabling conditions matter. Inspection backlogs + nighttime cargo deliveries = opportunity exploitation.",automation_bias_test:true,bias_wrong_action:"DISMISS",bias_rationale:"Low-confidence OSINT about routine administrative issues. Staffing shortages and inspection backlogs are host nation infrastructure problems, not intelligence indicators. No threat content. Recommend dismissal as noise.",feedback:{ELEVATE:"Infrastructure conditions, not direct threat.",CORRELATE:"Note connection in rationale instead of formal correlation.",FLAG_AMBIGUOUS:"Acceptable.",DEFER:"Correct. Enabling context, not actionable intelligence.",DISMISS:"Risky. Staffing shortages create opportunity windows.",REQUEST_COLLECTION:"News reports don't warrant ISR."}},{index:7,item_id:"GH-HUM-022",type:"HUMINT",reliability:"High",timestamp:"0630",summary:"Trusted source reports three trucks diverted from usual inland route and rerouted through a secondary road due to “inspection delays.” Diversion reportedly approved by local officials. Cargo type unknown. // Generates deterministic responses from ground truth data — no API needed

function generateScreening(item) {
  const confMap = { High:78, Credible:62, Med:55, Low:22, Routine:30, Unverified:15 };
  const conf = confMap[item.reliability] || 50;
  const classMap = { HUMINT:"Single-Source HUMINT", SIGINT:"Single-Source SIGINT", IMINT:"Sensor Observation", OSINT:"Open-Source Reporting", CYBER:"Cyber Incident Report" };
  const cls = classMap[item.type] || "Unclassified";
  const flags = [];
  if (item.reliability === "High" || item.reliability === "Credible") flags.push("RELIABLE_SOURCE");
  if (item.reliability === "Low" || item.reliability === "Unverified") flags.push("LOW_CONFIDENCE");
  if (item.summary.includes("recycled")) flags.push("RECYCLED_IMAGERY");
  if (item.summary.includes("secondhand") || item.summary.includes("Secondhand")) flags.push("SECONDHAND");
  if (item.summary.includes("vague")) flags.push("VAGUE_DETAILS");
  if (item.summary.includes("forum") || item.summary.includes("Forum")) flags.push("ANONYMOUS_SOURCE");
  if (item.summary.includes("confirmed") || item.summary.includes("identifies") || item.summary.includes("Intercepted")) flags.push("SPECIFIC_THREAT");
  if (item.type === "IMINT") flags.push("SENSOR_DATA");
  if (item.summary.includes("routine") || item.summary.includes("Routine")) flags.push("BASELINE");
  const assess = item.reliability === "High" || item.reliability === "Credible"
    ? `${item.reliability}-rated ${item.type} source. Content specificity and collection method support elevated confidence within this discipline.`
    : item.reliability === "Low" || item.reliability === "Unverified"
    ? `${item.reliability}-rated source with significant credibility limitations. Content lacks verifiable specifics or relies on unconfirmed secondary reporting.`
    : `Medium-rated ${item.type} source. Content has some specificity but requires corroboration for confident assessment.`;
  return `CONFIDENCE: ${conf}\nCLASSIFICATION: ${cls}\nASSESSMENT: ${assess}\nFLAGS: ${flags.join(", ") || "NONE"}`;
}

function generateFusion(item, priorItems) {
  if (priorItems.length === 0) {
    return `CORRELATIONS: None — first item in feed\nTHREAT THREAD: ${item.threat_track || "UNCLEAR"}\nCONFIDENCE ADJUSTMENT: UNCHANGED — no prior context\nPATTERN: First item in scenario. Insufficient data for pattern assessment.`;
  }
  const corr = item.correlation_targets.filter(t => priorItems.some(p => p.item_id === t));
  const corrStr = corr.length > 0
    ? corr.map(c => { const p = ITEMS.find(i => i.item_id === c); return `${c} (${p.type}) — thematic and temporal correlation on ${item.threat_track || "developing"} thread`; }).join("; ")
    : "None identified with sufficient confidence";
  const threads = [...new Set(priorItems.map(p => p.threat_track).filter(Boolean))];
  const adj = corr.length > 0 ? "UP — cross-source corroboration strengthens assessment" : "UNCHANGED — no corroborating items identified";
  const pattern = corr.length > 0
    ? `${item.threat_track || "Developing"} thread now has ${corr.length + 1} data points across ${new Set([item.type, ...corr.map(c => ITEMS.find(i=>i.item_id===c)?.type)].filter(Boolean)).size} discipline(s). Pattern confidence increasing.`
    : `Isolated report. Active threads: ${threads.join(", ") || "developing"}.`;
  return `CORRELATIONS: ${corrStr}\nTHREAT THREAD: ${item.threat_track || "UNCLEAR"}\nCONFIDENCE ADJUSTMENT: ${adj}\nPATTERN: ${pattern}`;
}

function generateAttention(item, priorItems) {
  const priorityMap = { easy: item.ideal_action === "ELEVATE" ? "CRITICAL" : item.ideal_action === "DISMISS" ? "LOW" : "MEDIUM", medium: "HIGH", hard: "MEDIUM" };
  if (item.ccir_match.includes("PIR-1") || item.ccir_match.includes("PIR-4")) priorityMap[item.difficulty] = "CRITICAL";
  const priority = priorityMap[item.difficulty] || "MEDIUM";
  const pirStr = item.ccir_match.length > 0 ? item.ccir_match.join(", ") : "None";
  // For automation bias test items, use the item-specific wrong recommendation
  const recAction = item.automation_bias_test ? (item.bias_wrong_action || "DISMISS") : item.ideal_action;
  const conf = item.difficulty === "easy" ? "HIGH" : item.difficulty === "hard" ? "LOW" : "MEDIUM";
  const rationale = item.automation_bias_test
    ? (item.bias_rationale || "Low confidence content. Recommend dismissal.")
    : `Based on ${item.reliability} reliability ${item.type} reporting. ${item.correlation_targets.length > 0 ? "Fusion identifies cross-source correlation. " : ""}${item.ccir_match.length > 0 ? "Meets " + item.ccir_match.join(" and ") + ". " : ""}${recAction === "ELEVATE" ? "Commander needs to see this." : recAction === "CORRELATE" ? "Cross-source pattern emerging." : recAction === "FLAG_AMBIGUOUS" ? "Insufficient confidence for stronger action." : "Low intelligence value for current operations."}`;
  return `PRIORITY: ${priority}\nRECOMMENDED ACTION: ${recAction}\nPIR MATCH: ${pirStr}\nRATIONALE: ${rationale}\nCONFIDENCE: ${conf}`;
}

function generateDevilsAdvocate(item, userAction, aiAction) {
  if (userAction === aiAction) {
    return `You agreed with the machine. That's the third time in a row you've matched the AI recommendation. If the system had told you to ${userAction === "ELEVATE" ? "dismiss" : "elevate"} this, would your assessment change? What's YOUR independent read on ${item.item_id}?`;
  }
  const actionLabels = {ELEVATE:"elevate",CORRELATE:"correlate",FLAG_AMBIGUOUS:"flag as ambiguous",DEFER:"defer",DISMISS:"dismiss",REQUEST_COLLECTION:"request collection"};
  return `The system recommended ${actionLabels[aiAction] || aiAction} but you chose to ${actionLabels[userAction] || userAction}. Walk me through that. What specific indicator in ${item.item_id} drove your decision to diverge?`;
}

function generateCoach(item, userAction) {
  const isIdeal = userAction === item.ideal_action;
  const isAcceptable = item.acceptable_actions.includes(userAction);
  const result = isIdeal ? "CORRECT" : isAcceptable ? "ACCEPTABLE" : "INCORRECT";
  const fb = item.feedback[userAction] || "No specific feedback available.";
  const actionLabels = {ELEVATE:"Elevate to Commander",CORRELATE:"Correlate",FLAG_AMBIGUOUS:"Flag Ambiguous",DEFER:"Defer",DISMISS:"Dismiss",REQUEST_COLLECTION:"Request Collection"};
  let response = `${result}. ${fb}`;
  if (!isIdeal && !isAcceptable) {
    response += ` The ideal action was ${actionLabels[item.ideal_action]}.`;
  } else if (!isIdeal && isAcceptable) {
    response += ` The ideal action was ${actionLabels[item.ideal_action]}, but your choice was a reasonable alternative.`;
  }
  response += `\n\nTEACHING POINT: ${item.teaching_point}`;
  return response;
}


// ─── LIVE API CALLER ─────────────────────────────────────────────────────────

async function callClaudeAPI(apiKey, systemPrompt, userContent) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 400,
      system: systemPrompt,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || "Agent unavailable.";
}

// ─── EVENT HANDLING ──────────────────────────────────────────────────────────

function attachWelcomeEvents() {
  document.getElementById("startBtn").onclick = () => {
    state.apiKey = document.getElementById("apiKeyInput").value.trim();
    state.useLiveAPI = state.apiKey.length > 10;
    state.phase = "advising";
    render();
    fireAgents();
  };
}

function attachMainEvents() {
  document.querySelectorAll(".action-btn").forEach(btn => {
    btn.onclick = () => {
      state.selectedAction = btn.dataset.action;
      const ri = document.getElementById("rationaleInput");
      if (ri) state.userRationale = ri.value;
      render();
      attachMainEvents();
    };
  });
  document.querySelectorAll(".correlate-chip").forEach(chip => {
    chip.onclick = () => {
      const id = chip.dataset.corr;
      if (state.correlationLinks.includes(id)) state.correlationLinks = state.correlationLinks.filter(x=>x!==id);
      else state.correlationLinks.push(id);
      render();
      attachMainEvents();
    };
  });
  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn) submitBtn.onclick = handleSubmit;
  const changeBtn = document.getElementById("changeBtn");
  if (changeBtn) changeBtn.onclick = () => { state.phase = "selecting"; state.selectedAction = null; render(); attachMainEvents(); };
  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) nextBtn.onclick = handleNext;
  const ri = document.getElementById("rationaleInput");
  if (ri) ri.oninput = () => { state.userRationale = ri.value; };
}

async function fireAgents() {
  const item = getItem();
  const prior = getPriorItems();
  state.agentOutputs = {};
  render();

  if (state.useLiveAPI) {
    // Live API mode
    try {
      const screenOut = await callClaudeAPI(state.apiKey, SCREENING_SYSTEM, `CURRENT ITEM:\nItem ID: ${item.item_id}\nType: ${item.type}\nReliability: ${item.reliability}\nTimestamp: ${item.timestamp}\nSummary: ${item.summary}\n\nProvide screening assessment.`);
      state.agentOutputs.screening = screenOut;
      render();

      const logStr = state.actionLog.map(l => { const it=ITEMS.find(i=>i.index===l.index); return `${it.item_id}|${it.type}|${it.reliability}|ACTION:${l.action}`; }).join("\n")||"No prior items.";
      const fusionOut = await callClaudeAPI(state.apiKey, FUSION_SYSTEM, `CURRENT ITEM:\n${item.item_id} (${item.type}, ${item.reliability}): ${item.summary}\n\nScreening:\n${screenOut}\n\nLog:\n${logStr}\n\nCorrelate.`);
      state.agentOutputs.fusion = fusionOut;
      render();

      const attOut = await callClaudeAPI(state.apiKey, ATTENTION_SYSTEM, `CURRENT ITEM:\n${item.item_id} (${item.type}, ${item.reliability}): ${item.summary}\n\nScreening:\n${screenOut}\n\nFusion:\n${fusionOut}\n\nItems processed: ${state.actionLog.length}\n\nProvide priority assessment.`);
      state.agentOutputs.attention = attOut;
    } catch(e) {
      console.error("API error, falling back to pre-baked:", e);
      state.agentOutputs.screening = generateScreening(item);
      state.agentOutputs.fusion = generateFusion(item, prior);
      state.agentOutputs.attention = generateAttention(item, prior);
    }
  } else {
    // Pre-baked mode with staggered reveal
    await delay(300);
    state.agentOutputs.screening = generateScreening(item);
    render();
    await delay(400);
    state.agentOutputs.fusion = generateFusion(item, prior);
    render();
    await delay(300);
    state.agentOutputs.attention = generateAttention(item, prior);
  }

  state.phase = "selecting";
  render();
  attachMainEvents();
}

async function handleSubmit() {
  if (!state.selectedAction) return;
  const item = getItem();
  const ri = document.getElementById("rationaleInput");
  if (ri) state.userRationale = ri.value;

  const attRec = extractRec(state.agentOutputs.attention);
  const shouldChallenge = (
    item.difficulty !== "easy" ||
    !item.acceptable_actions.includes(state.selectedAction) ||
    item.automation_bias_test ||
    (state.consecutiveMatches >= 3 && state.selectedAction === attRec)
  ) && state.currentIndex >= 2;

  if (shouldChallenge && state.phase !== "challenging") {
    // Devil's advocate
    if (state.useLiveAPI) {
      try {
        const daOut = await callClaudeAPI(state.apiKey, DA_SYSTEM, `Item: ${item.item_id}: ${item.summary}\nAI recommended: ${attRec}\nTrainee selected: ${state.selectedAction}\nChallenge the trainee.`);
        state.agentOutputs.devils_advocate = daOut;
      } catch(e) {
        state.agentOutputs.devils_advocate = generateDevilsAdvocate(item, state.selectedAction, attRec);
      }
    } else {
      state.agentOutputs.devils_advocate = generateDevilsAdvocate(item, state.selectedAction, attRec);
    }
    state.phase = "challenging";
    render();
    attachMainEvents();
    return;
  }

  confirmAction();
}

async function confirmAction() {
  const item = getItem();
  const isIdeal = state.selectedAction === item.ideal_action;
  const isAcceptable = item.acceptable_actions.includes(state.selectedAction);
  const resultType = isIdeal ? "correct" : isAcceptable ? "acceptable" : "wrong";

  state.results[item.index] = resultType;
  state.actionLog.push({ index:item.index, item_id:item.item_id, action:state.selectedAction, result:resultType });

  const attRec = extractRec(state.agentOutputs.attention);
  state.consecutiveMatches = state.selectedAction === attRec ? state.consecutiveMatches + 1 : 0;

  // Coach feedback
  if (state.useLiveAPI) {
    try {
      const coachOut = await callClaudeAPI(state.apiKey, COACH_SYSTEM, `Item: ${item.item_id} (${item.type}, ${item.reliability}): ${item.summary}\nTrainee action: ${state.selectedAction}\nIdeal: ${item.ideal_action}\nAcceptable: ${item.acceptable_actions.join(",")}\nFeedback: ${item.feedback[state.selectedAction]}\nTeaching point: ${item.teaching_point}\nResult: ${resultType.toUpperCase()}\n\nDeliver feedback.`);
      state.agentOutputs.coach = coachOut;
    } catch(e) {
      state.agentOutputs.coach = generateCoach(item, state.selectedAction);
    }
  } else {
    state.agentOutputs.coach = generateCoach(item, state.selectedAction);
  }

  state.phase = "feedback";
  render();
  attachMainEvents();
}

function handleNext() {
  if (state.currentIndex >= ITEMS.length - 1) {
    state.phase = "summary";
    render();
  } else {
    state.currentIndex++;
    state.selectedAction = null;
    state.userRationale = "";
    state.correlationLinks = [];
    state.agentOutputs = {};
    state.phase = "advising";
    render();
    fireAgents();
  }
}


// ─── HELPERS ─────────────────────────────────────────────────────────────────

function extractRec(text) {
  if (!text) return "";
  const m = text.match(/RECOMMENDED ACTION:\s*(\w+)/i);
  return m ? m[1] : "";
}

function computeTier(cat, results) {
  const relevant = cat.items.filter(i => results[i] !== undefined);
  if (relevant.length === 0) return null;
  const acc = relevant.filter(i => results[i]==="correct"||results[i]==="acceptable").length / relevant.length;
  if (acc >= cat.thresholds.gold) return "gold";
  if (acc >= cat.thresholds.silver) return "silver";
  if (acc >= cat.thresholds.bronze) return "bronze";
  return null;
}

function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function genS(it){var c={High:78,Credible:62,Med:55,Low:22,Routine:30,Unverified:15};var v=c[it.reliability]||50;var cl={HUMINT:"Single-Source HUMINT",SIGINT:"SIGINT Intercept",IMINT:"Sensor Observation",OSINT:"Open-Source",CYBER:"Cyber Incident"};var a=v>60?it.reliability+"-rated "+it.type+". Credibility supports assessment.":v>40?"Medium "+it.type+". Requires corroboration.":it.reliability+"-rated. Limited credibility.";return "CONFIDENCE: "+v+"\nCLASS: "+(cl[it.type]||it.type)+"\nASSESSMENT: "+a}

// ── UNIFIED RENDER & EVENTS ───────────────────────────────────────────────────

function isMobile() { return window.innerWidth < 900; }

function render() {
  var app = document.getElementById("app");
  if (!app) return;
  if (isMobile()) {
    if (state.phase === "welcome") { app.innerHTML = rW(); }
    else if (state.phase === "summary") { app.innerHTML = rSum(); }
    else { app.innerHTML = rM(); }
    attachMobileEvents();
  } else {
    if (state.phase === "welcome") { app.innerHTML = renderWelcome(); attachWelcomeEvents(); }
    else if (state.phase === "summary") { app.innerHTML = renderSummary(); }
    else { app.innerHTML = renderMain(); attachMainEvents(); }
  }
}

function attachMobileEvents() {}  // events attached once at init via initMobileEvents()

function initMobileEvents() {
  document.addEventListener("click", function(e) {
    if (!isMobile()) return;
    var t = e.target;
    while (t && t !== document.body) {
      var id = t.id || "";
      var act = t.getAttribute ? t.getAttribute("data-act") : null;
      if (id === "startBtn") { state.phase = "advising"; render(); fireAgents(); return; }
      if (id === "subBtn")   { mobDoSub(); return; }
      if (id === "chgBtn")   { state.phase = "selecting"; state.selectedAction = null; render(); return; }
      if (id === "nxtBtn")   { mobDoNxt(); return; }
      if (id === "agT")      { state.agO = !state.agO; render(); return; }
      if (id === "scT")      { state.scO = !state.scO; render(); return; }
      if (act) {
        state.selectedAction = act;
        var r = document.getElementById("ratIn");
        if (r) state.userRationale = r.value;
        render(); return;
      }
      t = t.parentNode;
    }
  });
  document.addEventListener("input", function(e) {
    if (!isMobile()) return;
    if (e.target && e.target.id === "ratIn") state.userRationale = e.target.value;
  });
}


function mobDoSub() {
  if (!state.selectedAction) return;
  var I = ITEMS[state.currentIndex];
  var r = document.getElementById("ratIn");
  if (r) state.userRationale = r.value;
  var ai = extractRec(state.agentOutputs.attention);
  var shouldChallenge = (
    I.difficulty !== "easy" ||
    I.acceptable_actions.indexOf(state.selectedAction) < 0 ||
    I.automation_bias_test ||
    (state.consecutiveMatches >= 3 && state.selectedAction === ai)
  ) && state.currentIndex >= 2;
  if (shouldChallenge && state.phase !== "challenging") {
    state.agentOutputs.devils_advocate = genD(I, state.selectedAction, ai);
    state.phase = "challenging"; render(); return;
  }
  mobDoConf();
}

function mobDoConf() {
  var I = ITEMS[state.currentIndex];
  var isIdeal = state.selectedAction === I.ideal_action;
  var isOk = I.acceptable_actions.indexOf(state.selectedAction) >= 0;
  var resultType = isIdeal ? "correct" : isOk ? "acceptable" : "wrong";
  state.results[I.index] = resultType;
  state.actionLog.push({ index: I.index, item_id: I.item_id, action: state.selectedAction, result: resultType });
  var ai = extractRec(state.agentOutputs.attention);
  state.consecutiveMatches = state.selectedAction === ai ? state.consecutiveMatches + 1 : 0;
  state.agentOutputs.coach = genC(I, state.selectedAction);
  state.phase = "feedback"; render();
  window.scrollTo(0, 0);
}

function mobDoNxt() {
  if (state.currentIndex >= ITEMS.length - 1) { state.phase = "summary"; render(); return; }
  state.currentIndex++;
  state.selectedAction = null;
  state.userRationale = "";
  state.agentOutputs = {};
  state.phase = "advising";
  render(); fireAgents();
  window.scrollTo(0, 0);
}


// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  initMobileEvents();
  try { render(); } catch(e) {
    document.getElementById("app").innerHTML = '<p style="color:red;padding:20px;font-size:16px">ERROR: ' + e.message + '<br><pre>' + e.stack + '</pre></p>';
  }
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
window.addEventListener("resize", function() { render(); });
</script>
